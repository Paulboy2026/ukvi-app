    let currentPool = [];
    let currentQuestion = null;

    function loadCategory(category) {
        if (category === "All") {
            currentPool = [].concat(...Object.values(questionBank));
        } else {
            currentPool = questionBank[category] || [];
        }
        loadRandomQuestion();
    }

    function loadRandomQuestion() {
        if (currentPool.length === 0) return;
        currentQuestion = currentPool[Math.floor(Math.random() * currentPool.length)];
        document.getElementById('question').innerText = currentQuestion.q;
        document.getElementById('feedback').innerText = "";
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        let options = [currentQuestion.a];
        while (options.length < 4) {
            let randomQ = currentPool[Math.floor(Math.random() * currentPool.length)];
            if (!options.includes(randomQ.a)) options.push(randomQ.a);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                if (opt === currentQuestion.a) {
                    document.getElementById('feedback').innerText = "Correct! ✅ Moving to next...";
                    const u = new SpeechSynthesisUtterance(currentQuestion.a);
                    u.lang = 'en-GB';
                    u.onend = () => { loadRandomQuestion(); };
                    window.speechSynthesis.speak(u);
                } else {
                    document.getElementById('feedback').innerText = "Try again! ❌";
                }
            };
            container.appendChild(b);
        });
    }

    function speakQuestion() { 
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentQuestion.q);
        u.lang = 'en-GB';
        window.speechSynthesis.speak(u); 
    }

    window.onload = () => setTimeout(() => loadCategory("All"), 100);
</script>
